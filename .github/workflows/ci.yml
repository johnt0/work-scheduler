name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379
      API_KEYS: dev-secret-key
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW_MS: 60000
      WORKER_CONCURRENCY: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Build
        run: npm run build

      - name: Start server and worker
        run: |
          npm start &
          npm run worker &
          timeout 30 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 1; done'

      - name: Run tests
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t work-scheduler .
